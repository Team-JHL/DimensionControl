messages:
  usage:
    general: "Usage: /dimension <add/remove/teleport/list/reset> <name> [preset] [direction]"
    add: "Usage: /dimension add <name> [preset]"
    remove: "Usage: /dimension remove <name>"
    reset: "Usage: /dimension reset <name> [preset]"
    teleport: "Usage: /dimension teleport <player> <dimension> [x y z] [direction]"

  error:
    no_perm: "You do not have permission to use this command"
    unknown_action: "Unknown command. Available: add, remove, teleport, list, reset"
    dim_exists: "The dimension '{0}' already exists"
    preset_not_found: "Preset '{0}' not found. A blank world will be created"
    copy_error: "Error while copying preset: {0}"
    world_create_fail: "Failed to create world '{0}'"
    dim_not_loaded: "The dimension '{0}' does not exist or is not loaded"
    invalid_coords: "Invalid coordinates. Please provide valid numbers for x, y and z"
    invalid_direction: "Invalid direction. Available: north, south, west, east"
    invalid_dim_name: "Invalid dimension name. Only letters and numbers are allowed"

  success:
    teleport: "You have been teleported to '{0}'"
    add: "Dimension '{0}' has been created"
    remove: "Dimension '{0}' has been removed"
    list_empty: "No custom dimensions found"
    preset_applied: "Preset '{0}' has been applied"
    list: "Available dimensions: {0}"
    seed_applied: "Seed {0} applied"

  warn:
    teleported_player: "You were teleported back to the overworld from the removed dimension '{0}'"
    wait: "Creating world (this may take a moment)"