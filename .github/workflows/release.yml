name: DimensionControl Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Find JAR
        id: jar
        run: echo "JAR=$(ls target/*.jar | head -n 1)" >> $GITHUB_OUTPUT

      # 🔥 VERSION AUS CHANGELOG.md (OBERSTE VERSION)
      - name: Extract version from CHANGELOG
        id: vars
        run: |
          VERSION=$(grep -m1 '^## ' CHANGELOG.md | sed 's/^## //')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # 📝 Nur oberster Changelog-Block
      - name: Extract changelog section
        id: changelog
        run: |
          awk '
            /^## / { if (seen++) exit }
            { gsub(/\\##/, "##"); print }
          ' CHANGELOG.md > changelog.txt

          cat changelog.txt

          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          printf "%s\n" "$(cat changelog.txt)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 🔥 RELEASE
      - name: Publish Modrinth + CurseForge
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: cCx6ajJA
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 1272718
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: ${{ steps.jar.outputs.JAR }}

          name: DimensionControl ${{ steps.vars.outputs.VERSION }}
          version: ${{ steps.vars.outputs.VERSION }}

          changelog-file: changelog.txt

          loaders: |
            paper
            spigot
            bukkit
            purpur

          game-versions: |
            26.1.X
            26.2

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.VERSION }}
          name: DimensionControl ${{ steps.vars.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: ${{ steps.jar.outputs.JAR }}